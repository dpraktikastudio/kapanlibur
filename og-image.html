<!-- Export: open at 1200x700 viewport or screenshot; save as assets/OgImage.png (1200x630) for social preview. -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>OG image template — Kapan Libur</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      width: 1200px;
      height: 630px;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(145deg, #0f766e 0%, #0d9488 45%, #134e4a 100%);
      color: #fff;
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .brand { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; }
    .sub { font-size: 1.65rem; font-weight: 600; margin-top: 12px; opacity: 0.95; max-width: 900px; line-height: 1.35; }
    ul {
      font-size: 1.15rem;
      line-height: 1.55;
      list-style: none;
      padding: 0;
      opacity: 0.92;
    }
    ul li { margin-bottom: 8px; padding-left: 1.2em; position: relative; }
    ul li::before { content: "•"; position: absolute; left: 0; color: #5eead4; }
    .footer { font-size: 0.95rem; opacity: 0.85; font-weight: 500; }
  </style>
</head>
<body>
  <div>
    <div class="brand">Kapan Libur</div>
    <p class="sub">Hari Libur Nasional — tanggal merah, cuti bersama, dan libur panjang Indonesia</p>
  </div>
</body>
</html>
